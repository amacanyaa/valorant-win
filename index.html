<html lang="tr">
<head>

    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        body { background: var(--dark-bg) url('bg.jpg') fixed center/cover; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* CANLI DROPLAR: SOLDAN GİRİŞLİ VE İTTİRMELİ SİSTEM */
        .live-drops { background: rgba(0, 0, 0, 0.95); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; width: 100%; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 50; color: #fff; box-shadow: 15px 0 25px rgba(0,0,0,0.8); }
        
        .drop-container { display: flex; align-items: center; gap: 10px; padding-left: 15px; flex-grow: 1; transition: all 0.5s ease; }

        .drop-card { 
            background: rgba(255,255,255,0.03); 
            border-radius: 4px; 
            width: 130px; 
            height: 75px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            flex-shrink: 0; 
            padding-top: 10px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideFromLeft 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes slideFromLeft {
            from { transform: translateX(-150px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }

        /* HEADER */
        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; }

        /* CASE MODAL */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:9999; align-items:center; justify-content:center; }
        .modal-card { background:#111420; border:2px solid var(--valo-red); border-radius:15px; width:90%; max-width:500px; padding:40px; text-align:center; }
        
        .spinner-box { width:100%; height:130px; background:#0b1119; border:1px solid rgba(255,255,255,0.1); margin:25px 0; overflow:hidden; position:relative; display:flex; align-items:center; border-radius: 8px; }
        .spinner-line { position:absolute; left:50%; width:3px; height:100%; background:var(--valo-red); z-index:10; transform: translateX(-50%); box-shadow: 0 0 15px var(--valo-red); }
        .item-strip { display:flex; position:absolute; left:0; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items:center; }
        .item-strip img { width:120px; height: 90px; object-fit: contain; margin:0 15px; }

        /* CASE GRID */
        .case-wrapper { max-width: 1200px; margin: 50px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .case-box { background: #101123; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; width: 250px; cursor: pointer; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-box img { width: 100%; height: 150px; object-fit: contain; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 20px; margin: 15px 0; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 12px; font-weight: 800; border-radius: 4px; text-transform: uppercase; }

        .win-screen { display:none; }
    </style>
</head>
