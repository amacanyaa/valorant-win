<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | Case Opening</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Oswald:wght@300;500;700&display=swap');

        :root { --valo-red: #ff4655; --dark-bg: #0b1119; }

        body {
            background: var(--dark-bg) url('bg.jpg') fixed center/cover;
            color: white; font-family: 'Oswald', sans-serif; margin: 0; overflow-x: hidden;
        }

        .live-drops { background: rgba(0, 0, 0, 0.9); height: 90px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; }
        .drop-track { display: flex; padding-left: 20px; gap: 10px; }
        
        .drop-card {
            background: rgba(255,255,255,0.05); border-bottom: 3px solid var(--valo-red);
            border-radius: 4px; min-width: 135px; height: 65px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .drop-card img { height: 35px; }
        .drop-card span { font-size: 9px; color: #aaa; margin-top: 5px; }

        header { padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 35px; font-weight: 900; }
        .logo span { color: var(--valo-red); }

        .btn-riot {
            background: var(--valo-red); color: white; border: none; padding: 10px 25px;
            font-family: 'Big Shoulders Display', sans-serif; font-size: 20px; font-weight: 900;
            cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-riot:hover { background: white; color: var(--valo-red); }
        .btn-riot img { height: 18px; }

        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 50px 60px; max-width: 1400px; margin: auto; }
        .case-box { background: rgba(15, 23, 33, 0.95); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 25px; text-align: center; transition: 0.3s; cursor: pointer; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-box img { width: 100%; height: 170px; object-fit: contain; }
        
        .open-btn { border: 2px solid var(--valo-red); color: var(--valo-red); background: transparent; width: 100%; padding: 10px; font-weight: 700; margin-top: 15px; cursor: pointer; border-radius: 4px; }
        .case-box:hover .open-btn { background: var(--valo-red); color: white; }
    </style>
</head>
<body>

<div class="live-drops"><div class="drop-track" id="dropTrack"></div></div>

<header>
    <div class="logo">VALO<span>LOOT</span></div>
    <button class="btn-riot" onclick="openAuth()">
        <img src="logo.png"> İÇERİ GEL
    </button>
</header>

<div class="case-grid">
    <div class="case-box" onclick="openAuth()"><img src="case1.png"><h3>GÜNLÜK ÜCRETSİZ</h3><button class="open-btn">AÇ</button></div>
    <div class="case-box" onclick="openAuth()"><img src="case2.png"><h3>KURONAMI ÖZEL</h3><button class="open-btn">250 VP</button></div>
    <div class="case-box" onclick="openAuth()"><img src="case3.png"><h3>EJDERATEŞİ</h3><button class="open-btn">450 VP</button></div>
    <div class="case-box" onclick="openAuth()"><img src="case4.png"><h3>CHAMPIONS 2024</h3><button class="open-btn">800 VP</button></div>
</div>

<script src="script.js"></script>
</body>
</html>
