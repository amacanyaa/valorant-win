<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT LOOT | Case Opening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Google'dan profesyonel fontları çekiyoruz */
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Oswald:wght@400;600&display=swap');

        body { background: #0f1923; color: white; font-family: 'Oswald', sans-serif; margin: 0; overflow-x: hidden; }

        /* 1. Üst Şerit (Canlı Drop Akışı) */
        .live-drops { background: #111; height: 85px; border-bottom: 2px solid #ff4655; display: flex; align-items: center; overflow: hidden; position: relative; }
        .drop-track { display: flex; gap: 15px; animation: scroll 40s linear infinite; padding-left: 20px; }
        .drop-item { 
            min-width: 140px; background: #1a252e; padding: 8px; border-radius: 4px; 
            text-align: center; border-bottom: 3px solid #ff4655; position: relative;
        }
        .drop-item img { height: 45px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,70,85,0.5)); }
        .drop-item span { display: block; font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        /* 2. Header Bölümü */
        header { 
            background: rgba(18, 28, 38, 0.98); padding: 10px 60px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.7); border-bottom: 1px solid #333;
        }
        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 35px; color: #ff4655; letter-spacing: 1px; cursor: pointer; }
        .nav-links { display: flex; gap: 40px; color: #ece8e1; font-size: 15px; text-transform: uppercase; font-weight: 600; }
        .nav-links div { cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .nav-links div:hover { opacity: 1; color: #ff4655; }

        /* Riot Giriş Butonu (SS'deki gibi) */
        .riot-btn { 
            background: #ff4655; color: white; border: none; padding: 12px 30px; 
            font-family: 'Big Shoulders Display', sans-serif; font-size: 20px;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 12px;
            text-transform: uppercase; transition: 0.2s; border-radius: 4px;
            letter-spacing: 1px;
        }
        .riot-btn:hover { background: #ffffff; color: #ff4655; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .riot-btn img { height: 22px; } /* Orijinal Riot Logosu İçin */

        /* 3. Banner Alanı */
        .hero-banner { 
            width: 90%; max-width: 1200px; margin: 40px auto; height: 300px;
            background: linear-gradient(135deg, #0f1923 30%, rgba(255,70,85,0.4) 100%), 
                        url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt6f369da39846399b/61d749446d3e3f162985474a/VAL_Jett_Wallpaper.jpg');
            background-size: cover; background-position: center; border-radius: 15px; 
            display: flex; flex-direction: column; justify-content: center; padding: 0 60px;
            border: 1px solid rgba(255,70,85,0.3); position: relative;
        }
        .hero-banner h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: 55px; margin: 0; line-height: 0.9; }
        .hero-banner p { color: #ccc; font-size: 20px; max-width: 500px; margin-top: 15px; }

        /* 4. Kasalar */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 20px 60px 60px; max-width: 1300px; margin: auto; }
        .case-card { 
            background: #1a252e; border-radius: 12px; padding: 30px; text-align: center; 
            border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative;
        }
        .case-card:hover { transform: translateY(-10px); border-color: #ff4655; background: #222c36; }
        .case-card img { width: 100%; max-width: 220px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5)); }
        .case-card h3 { font-family: 'Big Shoulders Display', sans-serif; font-size: 28px; margin: 20px 0 10px; color: #fff; }
        
        .open-btn { 
            width: 100%; padding: 15px; background: rgba(255,70,85,0.1); border: 2px solid #ff4655;
            color: #ff4655; font-family: 'Big Shoulders Display', sans-serif; font-size: 22px;
            font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        .case-card:hover .open-btn { background: #ff4655; color: white; }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

<div class="live-drops">
    <div class="drop-track" id="dropTrack">
        </div>
</div>

<header>
    <div class="logo">VALO<span style="color:#ece8e1">LOOT</span></div>
    <div class="nav-links">
        <div>KASALAR</div>
        <div>SAVAŞLAR</div>
        <div>YÜKSELTME</div>
        <div>GÜNLÜK ÖDÜL</div>
    </div>
    <div class="auth-section">
        <button class="riot-btn" onclick="openLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Riot_Games_logo.svg/1200px-Riot_Games_logo.svg.png" alt="R">
            İÇERİ GEL
        </button>
    </div>
</header>

<div class="hero-banner">
    <h1>YENİ OYUNCULARA ÖZEL</h1>
    <h1 style="color:#ff4655">BEDAVA KASA SİSTEMİ</h1>
    <p>Riot hesabınla giriş yap, en değerli skinleri anında hesabına aktarma şansı yakala.</p>
</div>

<div class="case-grid">
    <div class="case-card" onclick="checkLogin()">
        <img src="https://static.wikia.nocookie.net/valorant/images/2/23/Ignition_Crate.png" alt="Case">
        <h3>GÜNLÜK ÜCRETSİZ KASA</h3>
        <button class="open-btn">ÜCRETSİZ AÇ</button>
    </div>

    <div class="case-card" onclick="checkLogin()">
        <img src="https://static.wikia.nocookie.net/valorant/images/e/e0/Prime_Phantom.png" alt="Case" style="height: 120px; object-fit: contain; margin-bottom: 20px;">
        <h3>PRIME KOLEKSİYONU</h3>
        <button class="open-btn" style="border-color: #333; color: #555;">BAKİYE YETERSİZ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
