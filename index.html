<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT DROP | Case Opening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800;900&family=Oswald:wght@400;600&display=swap');

        :root {
            --valo-red: #ff4655;
            --valo-dark: #0f1923;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-shadow: 0 0 20px rgba(255, 70, 85, 0.3);
        }

        body {
            background: var(--valo-dark);
            color: white;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #3a1c21 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* 1. KESİNTİSİZ AKAN ÜST ŞERİT */
        .live-drops {
            background: rgba(10, 10, 15, 0.95);
            height: 90px;
            border-bottom: 2px solid var(--valo-red);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .drop-track {
            display: flex;
            width: max-content;
            animation: continuousScroll 30s linear infinite;
        }

        @keyframes continuousScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .drop-item {
            width: 140px;
            height: 70px;
            background: linear-gradient(145deg, #161d25, #0a0e12);
            margin: 0 5px;
            border-radius: 6px;
            border-bottom: 3px solid var(--valo-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .drop-item img { height: 40px; filter: drop-shadow(0 0 8px var(--valo-red)); }
        .drop-item span { font-size: 9px; color: #888; text-transform: uppercase; margin-top: 4px; }

        /* 2. HEADER & BANNER */
        header {
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 25, 35, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 40px; font-weight: 900; color: white; }
        .logo span { color: var(--valo-red); }

        .riot-btn {
            background: var(--valo-red);
            color: white;
            border: none;
            padding: 12px 30px;
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: var(--neon-shadow);
        }

        .riot-btn:hover { background: white; color: var(--valo-red); transform: translateY(-2px); }
