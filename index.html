<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT LOOT | Case Opening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Oswald:wght@400;600&display=swap');

        body { 
            background: #0f1923; 
            /* Güzel bir arka plan deseni ve gradyan */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 70, 85, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 70, 85, 0.05) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: white; 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 1. Üst Şerit (Yeni Drop Akışı) */
        .live-drops { 
            background: rgba(17, 17, 17, 0.9); 
            height: 90px; 
            border-bottom: 2px solid #ff4655; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .drop-track { 
            display: flex; 
            gap: 12px; 
            padding: 0 10px;
            transition: transform 0.5s ease-in-out;
        }
        .drop-item { 
            min-width: 130px; 
            background: linear-gradient(180deg, #1a252e 0%, #111 100%);
            padding: 8px; 
            border-radius: 4px; 
            text-align: center; 
            border-bottom: 3px solid #ff4655;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .drop-item img { height: 45px; object-fit: contain; filter: drop-shadow(0 0 5px #ff4655); }
        .drop-item span { display: block; font-size: 9px; color: #ff4655; font-weight: bold; text-transform: uppercase; }

        header { 
            background: rgba(18, 28, 38, 0.95); 
            padding: 15px 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #333;
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 38px; color: #ff4655; font-weight: 900; }
        
        .riot-btn { 
            background: #ff4655; color: white; border: none; padding: 12px 25px; 
            font-family: 'Big Shoulders Display', sans-serif; font-size: 22px;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.3s; border-radius: 4px;
        }
        .riot-btn:hover { background: #fff; color: #ff4655; transform: scale(1.05); }
        .riot-btn img { height: 20px; }

        .case-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 40px 60px; 
            max-width: 1400px; 
            margin: auto; 
        }
        .case-card { 
            background: rgba(26, 37, 46, 0.8); 
            border-radius: 12px; 
            padding: 25px; 
            text-align: center; 
            border: 1px solid #333; 
            transition: 0.3s; 
            backdrop-filter: blur(5px);
        }
        .case-card:hover { border-color: #ff4655; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,70,85,0.1); }
        .case-card img { width: 100%; height: 180px; object-fit: contain; }
        .case-card h3 { font-family: 'Big Shoulders Display', sans-serif; font-size: 24px; margin: 15px 0; }
        
        .open-btn { 
            width: 100%; padding: 12px; border: 2px solid #ff4655; background: none;
            color: #ff4655; font-family: 'Big Shoulders Display', sans-serif; font-size: 20px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .case-card:hover .open-btn { background: #ff4655; color: white; }
    </style>
</head>
<body>

<div class="live-drops">
    <div class="drop-track" id="dropTrack"></div>
</div>
