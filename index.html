<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | Case Opening</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800;900&family=Oswald:wght@400;500;600&display=swap');

        :root { 
            --valo-red: #ff4655; 
            --dark-bg: #0b1119; 
            --panel-bg: rgba(18, 25, 33, 0.95);
        }

        body {
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(11, 17, 25, 0.8), rgba(11, 17, 25, 0.9)), url('bg.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: white; 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Üst Şerit Animasyonu */
        .live-drops { 
            background: rgba(0, 0, 0, 0.85); 
            height: 100px; 
            border-bottom: 2px solid var(--valo-red); 
            display: flex; 
            align-items: center; 
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .drop-track { display: flex; padding-left: 20px; }

        .drop-wrapper {
            animation: slideIn 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            flex-shrink: 0;
            width: 140px;
            margin-right: 12px;
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-50px) scale(0.8); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        .drop-card {
            background: #1a232c;
            border-bottom: 3px solid var(--valo-red);
            border-radius: 4px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .drop-card img { height: 40px; }
        .drop-card span { font-size: 10px; color: #777; margin-top: 3px; }

        /* Header & Logo */
        header { 
            padding: 15px 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 40px; font-weight: 900; color: white; text-decoration: none;}
        .logo span { color: var(--valo-red); }

        .riot-btn { 
            background: var(--valo-red); 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            font-family: 'Big Shoulders Display', sans-serif; 
            font-size: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            transition: 0.3s;
        }
        .riot-btn:hover { background: white; color: var(--valo-red); }
        .riot-btn img { height: 18px; }

        /* Kasa Grid */
        .case-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 50px 60px; 
            max-width: 1400px; 
            margin: auto; 
        }

        .case-box { 
            background: var(--panel-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px; 
            padding: 25px; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer;
        }
        
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-box img { width: 100%; height: 160px; object-fit: contain; }
        .case-box h3 { font-family: 'Big Shoulders Display', sans-serif; font-size: 26px; margin: 15px 0 5px; }
        
        .price-btn {
            border: 2px solid var(--valo-red); color: var(--valo-red);
            padding: 10px; width: 100%; font-family: 'Big Shoulders Display', sans-serif;
            font-size: 22px; font-weight: 900; background: transparent; 
            cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        .case-box:hover .price-btn { background: var(--valo-red); color: white; }

    </style>
</head>
<body>

<div class="live-drops">
    <div class="drop-track" id="dropTrack"></div>
</div>

<header>
    <a href="#" class="logo">VALOLOOT<span>.NET</span></a>
    <button class="riot-btn" id="loginBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Riot_Games_logo.svg/1200px-Riot_Games_logo.svg.png">
        GİRİŞ YAP
    </button>
</header>

<div class="case-grid">
    <div class="case-box" onclick="triggerLogin()">
        <img src="case1.png">
        <h3>BAŞLANGIÇ KASASI</h3>
        <button class="price-btn">ÜCRETSİZ</button>
    </div>
    
    <div class="case-box" onclick="triggerLogin()">
        <img src="case2.png">
        <h3>KURONAMI ÖZEL</h3>
        <button class="price-btn">250 VP</button>
    </div>

    <div class="case-box" onclick="triggerLogin()">
        <img src="case3.png">
        <h3>EJDERATEŞİ</h3>
        <button class="price-btn">450 VP</button>
    </div>

    <div class="case-box" onclick="triggerLogin()">
        <img src="case4.png">
        <h3>CHAMPIONS 2024</h3>
        <button class="price-btn">800 VP</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
