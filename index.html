<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | Premium Case Opening</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800;900&family=Oswald:wght@400;500;600&display=swap');

        :root { 
            --valo-red: #ff4655; 
            --dark-bg: #0f1923; 
            --panel-bg: rgba(20, 27, 35, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            /* Valorant Karakter/Harita Arka Planı ve Karanlık Filtre */
            background-image: 
                linear-gradient(to bottom, rgba(15, 25, 35, 0.85), rgba(15, 25, 35, 0.95)),
                url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt8b35061690a46328/6467a505c21f7823f6631cf5/Valorant_2023_EP6_KeyArt_16x9.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: white; 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* YENİ ÜST ŞERİT - RASTGELE ANİMASYONLU İTME */
        .live-drops { 
            background: rgba(0, 0, 0, 0.7); 
            height: 100px; 
            border-bottom: 2px solid var(--valo-red); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .drop-track { 
            display: flex; 
            align-items: center; 
            padding-left: 20px; 
        }

        /* Yeni giren itemin itme animasyonu */
        .drop-wrapper {
            animation: pushIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pushIn {
            0% { opacity: 0; width: 0; transform: translateX(-50px) scale(0.5); margin-right: 0; }
            100% { opacity: 1; width: 150px; transform: translateX(0) scale(1); margin-right: 15px; }
        }

        .drop-card {
            width: 150px; 
            height: 75px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--valo-red); 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }
        
        .drop-card img { height: 40px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .drop-card span { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: 500; margin-top: 5px; }
        .new-badge { position: absolute; top: -5px; right: -5px; background: var(--valo-red); color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* HEADER */
        header { 
            padding: 20px 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(15, 25, 35, 0.6); 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-family: 'Big Shoulders Display', sans-serif; font-size: 38px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--valo-red); }

        .riot-btn {
            background: var(--valo-red); color: white; border: none; padding: 12px 35px;
            font-family: 'Big Shoulders Display', sans-serif; font-size: 22px; font-weight: 800;
            cursor: pointer; border-radius: 4px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 70, 85, 0.4);
        }
        .riot-btn:hover { background: white; color: var(--valo-red); box-shadow: 0 0 25px rgba(255, 255, 255, 0.5); transform: translateY(-2px); }

        /* KASA IZGARASI VE PROFESYONEL ÇERÇEVELER */
        .case-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 30px; 
            padding: 50px 60px; 
            max-width: 1400px; 
            margin: auto; 
        }
