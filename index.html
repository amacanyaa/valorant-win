<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VALOLOOT.NET | Valorant Case Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --card-bg: #16172b; }

        body {
            background: var(--dark-bg) url('bg.jpg') fixed center/cover;
            color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden;
        }

        /* Üst Şerit */
        .live-drops { background: rgba(0, 0, 0, 0.95); height: 90px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; }
        .drop-track { display: flex; width: max-content; animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .drop-card { background: rgba(255,255,255,0.05); border-bottom: 3px solid var(--valo-red); border-radius: 4px; width: 150px; height: 70px; margin: 0 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .drop-card img { height: 40px; object-fit: contain; }
        .drop-card span { font-size: 10px; color: #ccc; margin-top: 5px; font-weight: 600; }

        /* Header */
        header { 
            padding: 15px 60px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(11, 17, 25, 0.9); backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--valo-red); }

        .btn-login {
            background: #79eb1e; color: #000; border: none; padding: 12px 28px;
            font-weight: 800; cursor: pointer; border-radius: 5px; transition: 0.3s;
            text-transform: uppercase; font-size: 15px;
        }
        .btn-login:hover { transform: scale(1.05); background: #8fff3d; }

        /* Popüler Kasalar Başlık */
        .section-title { 
            text-align: center; margin-top: 50px; font-family: 'Montserrat', sans-serif; 
            font-size: 32px; font-weight: 900; color: #fff; text-transform: uppercase;
        }

        /* Kasa Grid - Ortalandı */
        .case-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 320px)); 
            gap: 25px; padding: 40px 60px; max-width: 1400px; margin: auto; justify-content: center;
        }
        .case-box { background: var(--card-bg); border-radius: 15px; padding: 30px; text-align: center; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(255,70,85,0.1); }
        .case-box img { width: 100%; height: 160px; object-fit: contain; }
        .case-box h3 { font-size: 20px; margin: 15px 0 5px; font-weight: 700; }
        .vp-price { color: #79eb1e; font-weight: 800; font-size: 18px; margin-bottom: 20px; }
        .open-btn { background: var(--valo-red); color: #fff; border: none; width: 100%; padding: 12px; font-weight: 700; cursor: pointer; border-radius: 6px; }

        /* Canlı İstatistikler */
        .stats-bar {
            display: flex; justify-content: center; gap: 60px; padding: 60px 0;
            background: rgba(0,0,0,0.3); margin-top: 50px;
        }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 36px; font-weight: 900; color: var(--valo-red); font-family: 'Montserrat'; }
        .stat-label { font-size: 13px; color: #777; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="live-drops"><div class="drop-track" id="track"></div></div>

<header>
    <div class="logo">VALO<span>LOOT</span></div>
    <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
</header>

<h2 class="section-title">Popüler Kasalar</h2>
<div class="case-grid" id="caseGrid"></div>

<div class="stats-bar">
    <div class="stat-item">
        <span class="stat-value" id="stat-players">1,402</span>
        <span class="stat-label">Aktif Oyuncu</span>
    </div>
    <div class="stat-item">
        <span class="stat-value" id="stat-cases">42,890</span>
        <span class="stat-label">Açılan Kasa</span>
    </div>
    <div class="stat-item">
        <span class="stat-value" id="stat-vps">850,000</span>
        <span class="stat-label">Dağıtılan VP</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
