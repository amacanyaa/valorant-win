<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT LOOT | Case Opening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');

        body { background: #0f1923; color: white; font-family: 'Oswald', sans-serif; margin: 0; overflow-x: hidden; }

        /* 1. Üst Şerit (Live Drop Feed) */
        .live-drops { background: #111; height: 75px; border-bottom: 2px solid #ff4655; display: flex; align-items: center; overflow: hidden; position: relative; }
        .drop-track { display: flex; gap: 15px; animation: scroll 40s linear infinite; }
        .drop-item { min-width: 130px; background: #1a252e; padding: 5px; border-radius: 4px; text-align: center; border-bottom: 3px solid #ff4655; }
        .drop-item img { height: 40px; object-fit: contain; }
        .drop-item span { display: block; font-size: 10px; color: #888; text-transform: uppercase; }

        /* 2. Header Bölümü */
        header { background: rgba(18, 28, 38, 0.95); padding: 15px 60px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: bold; color: #ff4655; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; color: #ece8e1; font-size: 14px; text-transform: uppercase; }
        .nav-links div { cursor: pointer; transition: 0.3s; }
        .nav-links div:hover { color: #ff4655; }

        .auth-section { display: flex; align-items: center; gap: 20px; }
        .balance-box { background: #1f2326; padding: 8px 15px; border: 1px solid #333; border-radius: 4px; color: #00ff88; }
        
        /* Riot Giriş Butonu */
        .riot-btn { 
            background: #ff4655; color: white; border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase; transition: 0.3s; border-radius: 2px;
        }
        .riot-btn:hover { background: #cf3a46; box-shadow: 0 0 15px #ff4655; }
        .riot-btn img { height: 20px; filter: brightness(0) invert(1); }

        /* 3. Banner Alanı */
        .hero-banner { 
            width: 90%; max-width: 1200px; margin: 30px auto; height: 250px;
            background: linear-gradient(90deg, #111 0%, rgba(255,70,85,0.2) 100%), url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt03362095f9c1815b/5eb23091e99870197435f308/V_AGENTS_587x1025_Jett.png');
            background-size: cover; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; padding: 40px;
            border-left: 5px solid #ff4655;
        }
        .hero-banner h1 { font-size: 42px; margin: 0; text-transform: uppercase; }
        .hero-banner p { color: #888; font-size: 18px; }

        /* 4. Kasalar */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 60px; max-width: 1400px; margin: auto; }
        .case-card { 
            background: #1a252e; border-radius: 8px; padding: 20px; text-align: center; 
            border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative; overflow: hidden;
        }
        .case-card:hover { transform: translateY(-10px); border-color: #ff4655; box-shadow: 0 10px 30px rgba(255,70,85,0.2); }
        .case-card img { width: 100%; transition: 0.3s; }
        .case-card:hover img { transform: scale(1.1); }
        .case-card h3 { margin: 15px 0 5px; font-size: 20px; letter-spacing: 1px; }
        .price-tag { color: #00ff88; font-weight: bold; margin-bottom: 15px; display: block; }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

<div class="live-drops">
    <div class="drop-track" id="dropTrack">
        </div>
</div>

<header>
    <div class="logo">VALO<span style="color:#ece8e1">LOOT</span></div>
    <div class="nav-links">
        <div>Kasalar</div>
        <div>Savaşlar</div>
        <div>Yükseltme</div>
        <div>Kontratlar</div>
    </div>
    <div class="auth-section">
        <div class="balance-box">0.00 VP</div>
        <button class="riot-btn" onclick="openLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Riot_Games_logo.svg/2560px-Riot_Games_logo.svg.png">
            İÇERİ GEL
        </button>
    </div>
</header>

<div class="hero-banner">
    <h1>YENİ OYUNCULAR İÇİN</h1>
    <h1 style="color:#ff4655">ÜCRETSİZ KASA</h1>
    <p>Sadece bugün geçerli, hemen şansını dene!</p>
</div>

<div class="case-grid">
    <div class="case-card" onclick="checkLogin()">
        <img src="https://static.wikia.nocookie.net/valorant/images/2/23/Ignition_Crate.png">
        <h3>GÜNLÜK ÜCRETSİZ KASA</h3>
        <span class="price-tag">BEDAVA</span>
        <button class="riot-btn" style="width:100%; justify-content:center;">KASAYI AL</button>
    </div>

    <div class="case-card" onclick="checkLogin()">
        <img src="https://vignette.wikia.nocookie.net/valorant/images/b/b3/Tactibuddy_Gun_Buddy.png" style="width: 150px; margin: 20px;">
        <h3>ELITE KASA</h3>
        <span class="price-tag">250 VP</span>
        <button class="riot-btn" style="width:100%; justify-content:center; background:#333;">YETERSİZ BAKİYE</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
