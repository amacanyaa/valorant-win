<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VALOLOOT.NET | Valorant Case Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --valo-red: #ff4655; --dark-bg: #0b1119; --nav-bg: #111420; }

        body {
            background: var(--dark-bg) url('bg.jpg') fixed center/cover;
            color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden;
        }

        /* Üst Drop Şeridi */
        .live-drops { background: rgba(0, 0, 0, 0.9); height: 80px; border-bottom: 2px solid var(--valo-red); display: flex; align-items: center; overflow: hidden; }
        .drop-track { display: flex; width: max-content; animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .drop-card { background: rgba(255,255,255,0.05); border-bottom: 3px solid var(--valo-red); border-radius: 4px; width: 140px; height: 60px; margin: 0 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .drop-card img { height: 35px; object-fit: contain; }
        .drop-card span { font-size: 9px; color: #aaa; margin-top: 3px; font-weight: 600; }

        /* Navbar */
        header { 
            padding: 10px 50px; display: flex; align-items: center; background: var(--nav-bg); 
            border-bottom: 1px solid rgba(255,255,255,0.1); gap: 40px;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900; }
        .logo span { color: var(--valo-red); }

        .nav-links { display: flex; gap: 25px; flex-grow: 1; }
        .nav-links a { color: #888; text-decoration: none; font-size: 13px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .btn-login {
            background: #79eb1e; color: #000; border: none; padding: 10px 22px;
            font-weight: 800; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 14px;
        }

        /* Çekiliş Banner (Geri Getirildi) */
        .giveaway-section {
            max-width: 1100px; margin: 40px auto; background: linear-gradient(90deg, rgba(255,70,85,0.1) 0%, rgba(0,0,0,0.8) 50%, rgba(255,70,85,0.1) 100%);
            border: 1px solid var(--valo-red); border-radius: 12px; padding: 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .gv-info h2 { font-family: 'Montserrat', sans-serif; font-size: 38px; margin: 0; letter-spacing: -1px; }
        .gv-info p { color: var(--valo-red); font-weight: 800; margin: 5px 0 0; font-size: 14px; }
        .timer-wrap { text-align: center; border-left: 2px solid var(--valo-red); padding-left: 40px; }
        #countdown { font-size: 36px; font-weight: 900; color: #fff; font-family: 'Montserrat'; }

        /* Başlık Şeridi */
        .title-strip {

            text-align: center; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
